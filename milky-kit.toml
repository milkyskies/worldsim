[project]
name = "worldsim"
worktree_dir = "worldsim-worktrees"

[stack]
languages = ["rust"]

[skills]
include = [
    "ship",
    "retrospective",
    "land",
]

[sync]
exclude = [
    "monorepo.md",
    ".claude/rules/testing.md",
    ".claude/rules/clean-architecture.md",
    ".claude/rules/config-and-env.md",
    # Worldsim-specific overrides — see commit history.
    # Bevy compile is too slow for the full check trinity locally.
    ".mise/tasks/check/rust",
    ".claude/skills/ship/SKILL.md",
    # macOS uses default ld-prime (faster than LLD per Bevy docs); Linux keeps mold.
    ".cargo/config.toml",
]
